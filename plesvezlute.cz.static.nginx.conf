# HTTP → HTTPS redirect
server {
    listen 80;
    server_name plesvezlute.cz www.plesvezlute.cz;
    return 301 https://$host$request_uri;
}

# HTTPS — serve static files directly (no Node.js needed)
server {
    listen 443 ssl;
    server_name plesvezlute.cz www.plesvezlute.cz;

    ssl_certificate     /etc/letsencrypt/live/plesvezlute.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plesvezlute.cz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/balda/king-in-yellow/out;
    index index.html;

    # Next.js static export routing
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # 404 fallback
    error_page 404 /404.html;

    # Cache static assets aggressively
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
