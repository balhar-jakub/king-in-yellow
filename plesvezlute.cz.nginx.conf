# HTTP → HTTPS redirect
server {
    listen 80;
    server_name plesvezlute.cz www.plesvezlute.cz;
    return 301 https://$host$request_uri;
}

# HTTPS — proxy to Next.js
server {
    listen 443 ssl;
    server_name plesvezlute.cz www.plesvezlute.cz;

    # SSL (certbot will fill these in, or do it manually)
    ssl_certificate     /etc/letsencrypt/live/plesvezlute.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plesvezlute.cz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
